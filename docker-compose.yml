services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB:       ${POSTGRES_DB:-excelidraw}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-excelidraw}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── HTTP backend ────────────────────────────────────────────────────────────
  http-backend:
    build:
      context: .
      dockerfile: Dockerfile.http
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:    production
      PORT:        3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-excelidraw}?schema=public
      JWT_SECRET:  ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "3001:3001"

  # ── WebSocket backend ───────────────────────────────────────────────────────
  ws-backend:
    build:
      context: .
      dockerfile: Dockerfile.ws
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:    production
      WS_PORT:     8080
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-excelidraw}?schema=public
      JWT_SECRET:  ${JWT_SECRET:?JWT_SECRET is required}
    ports:
      - "8080:8080"

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_HTTP_BACKEND_URL: ${NEXT_PUBLIC_HTTP_BACKEND_URL:-http://localhost:3001}
        NEXT_PUBLIC_WS_URL:           ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080}
    restart: unless-stopped
    depends_on:
      - http-backend
      - ws-backend
    environment:
      NODE_ENV: production
      PORT:     3000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
