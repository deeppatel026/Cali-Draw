name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Override in repository Settings → Secrets and variables → Actions
  AWS_REGION:      ${{ vars.AWS_REGION       || 'us-east-1' }}
  ECR_REGISTRY:    ${{ secrets.ECR_REGISTRY }}          # e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_FRONTEND:  excelidraw-frontend
  IMAGE_HTTP:      excelidraw-http
  IMAGE_WS:        excelidraw-ws

# ─── Job 1: quality checks ────────────────────────────────────────────────────
jobs:
  quality:
    name: Type-check & lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check (all packages)
        run: pnpm turbo check-types

      - name: Lint (all packages)
        run: pnpm turbo lint
        # Skip gracefully if a package has no lint script
        continue-on-error: false

# ─── Job 2: build Docker images and push to ECR ──────────────────────────────
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: quality
    # Only run on push to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write   # needed for OIDC auth with AWS
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_uri=${{ env.ECR_REGISTRY }}/${{ env.IMAGE_FRONTEND }}" >> "$GITHUB_OUTPUT"
          echo "http_uri=${{ env.ECR_REGISTRY }}/${{ env.IMAGE_HTTP }}"         >> "$GITHUB_OUTPUT"
          echo "ws_uri=${{ env.ECR_REGISTRY }}/${{ env.IMAGE_WS }}"             >> "$GITHUB_OUTPUT"

      # Enable Docker layer caching to speed up repeated builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Frontend ──
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ steps.tags.outputs.frontend_uri }}:${{ steps.tags.outputs.sha }}
            ${{ steps.tags.outputs.frontend_uri }}:latest
          build-args: |
            NEXT_PUBLIC_HTTP_BACKEND_URL=${{ secrets.NEXT_PUBLIC_HTTP_BACKEND_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── HTTP backend ──
      - name: Build & push http-backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.http
          push: true
          tags: |
            ${{ steps.tags.outputs.http_uri }}:${{ steps.tags.outputs.sha }}
            ${{ steps.tags.outputs.http_uri }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── WS backend ──
      - name: Build & push ws-backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ws
          push: true
          tags: |
            ${{ steps.tags.outputs.ws_uri }}:${{ steps.tags.outputs.sha }}
            ${{ steps.tags.outputs.ws_uri }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # Persist the short SHA so the deploy job can reference it
      - name: Export short SHA
        run: echo "${{ steps.tags.outputs.sha }}" > /tmp/short_sha.txt

      - name: Upload short SHA artifact
        uses: actions/upload-artifact@v4
        with:
          name: short-sha
          path: /tmp/short_sha.txt

# ─── Job 3: deploy to EC2 via SSH ────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment: production   # enables manual approval gate if configured

    steps:
      - name: Download short SHA
        uses: actions/download-artifact@v4
        with:
          name: short-sha
          path: /tmp

      - name: Read short SHA
        id: sha
        run: echo "value=$(cat /tmp/short_sha.txt)" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          port:     22
          envs: ECR_REGISTRY,AWS_REGION,IMAGE_FRONTEND,IMAGE_HTTP,IMAGE_WS
          script: |
            set -e

            SHORT_SHA="${{ steps.sha.outputs.value }}"

            # ── Authenticate Docker with ECR ──────────────────────────────────
            aws ecr get-login-password --region $AWS_REGION \
              | docker login --username AWS --password-stdin $ECR_REGISTRY

            # ── Pull latest images ────────────────────────────────────────────
            docker pull $ECR_REGISTRY/$IMAGE_FRONTEND:$SHORT_SHA
            docker pull $ECR_REGISTRY/$IMAGE_HTTP:$SHORT_SHA
            docker pull $ECR_REGISTRY/$IMAGE_WS:$SHORT_SHA

            # Tag as "latest" on the host so docker-compose picks them up
            docker tag $ECR_REGISTRY/$IMAGE_FRONTEND:$SHORT_SHA $ECR_REGISTRY/$IMAGE_FRONTEND:latest
            docker tag $ECR_REGISTRY/$IMAGE_HTTP:$SHORT_SHA      $ECR_REGISTRY/$IMAGE_HTTP:latest
            docker tag $ECR_REGISTRY/$IMAGE_WS:$SHORT_SHA        $ECR_REGISTRY/$IMAGE_WS:latest

            # ── Update compose file and bring services up ─────────────────────
            cd ~/excelidraw   # directory on EC2 that holds docker-compose.yml + .env

            # Export image URIs so compose can override the build: blocks
            export FRONTEND_IMAGE=$ECR_REGISTRY/$IMAGE_FRONTEND:$SHORT_SHA
            export HTTP_IMAGE=$ECR_REGISTRY/$IMAGE_HTTP:$SHORT_SHA
            export WS_IMAGE=$ECR_REGISTRY/$IMAGE_WS:$SHORT_SHA

            docker compose pull --quiet   2>/dev/null || true
            docker compose up -d --remove-orphans

            # ── Run database migrations ───────────────────────────────────────
            # Wait for http-backend to be healthy then exec migrate
            sleep 10
            docker compose exec -T http-backend \
              prisma migrate deploy \
              --schema=./prisma/prisma/schema.prisma \
              || echo "Migrations already up to date"

            # ── Prune dangling images to reclaim disk ─────────────────────────
            docker image prune -f
